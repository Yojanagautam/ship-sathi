<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ship Sathi{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-900 px-6 py-4 flex justify-between items-center border-b border-gray-800">
        <a href="/" class="text-2xl font-bold text-indigo-400">🚢 Ship Sathi</a>
        <div class="flex gap-4">
            {% if request.session.access_token %}
                <a href="/dashboard/" class="text-gray-300 hover:text-white">Dashboard</a>
                <a href="/rooms/" class="text-gray-300 hover:text-white">Rooms</a>
                <a href="/leaderboard/" class="text-gray-300 hover:text-white">Leaderboard</a>
                <a href="/logout/" class="bg-red-600 px-4 py-1 rounded hover:bg-red-700">Logout</a>
            {% else %}
                <a href="/login/" class="text-gray-300 hover:text-white">Login</a>
                <a href="/register/" class="bg-indigo-600 px-4 py-1 rounded hover:bg-indigo-700">Register</a>
            {% endif %}
        </div>
    </nav>

    <!-- Content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
